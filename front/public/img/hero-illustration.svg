<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F5F4" />
      <stop offset="1" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="40" fill="url(#g1)" />

  <!-- Plate -->
  <ellipse cx="600" cy="460" rx="350" ry="90" fill="#FFF" stroke="#E6E6E5" />

  <!-- Cake base -->
  <rect x="420" y="300" width="360" height="160" rx="24" fill="#FDF7EC" stroke="#F0E6D6" />
  <!-- Frosting -->
  <path d="M420 330 q180 -60 360 0 v30 q-180 60 -360 0 z" fill="#FFE8D1" />

  <!-- Decorations -->
  <g transform="translate(0,0)">
    <circle cx="520" cy="330" r="10" fill="#FF7A7A" />
    <circle cx="620" cy="310" r="12" fill="#FFD166" />
    <circle cx="700" cy="335" r="10" fill="#8AD1C2" />
  </g>

  <!-- Candle -->
  <rect x="750" y="250" width="8" height="60" rx="3" fill="#FF7A7A" />
  <path d="M754 238 c6 -10 6 -18 0 -24 c-6 6 -6 14 0 24 z" fill="#FFD166" />

  <!-- Shadow -->
  <ellipse cx="600" cy="560" rx="260" ry="28" fill="#000" fill-opacity="0.05" />

  <!-- Small garnish items -->
  <g transform="translate(0,0)" fill-opacity="0.9">
    <rect x="460" y="420" width="18" height="8" rx="3" fill="#F2C94C" transform="rotate(-20 460 420)" />
    <rect x="680" y="420" width="18" height="8" rx="3" fill="#F2994A" transform="rotate(10 680 420)" />
  </g>

  <!-- Text watermark (subtle) -->
  <text x="48" y="760" font-family="Inter, sans-serif" font-size="18" fill="#E6E6E5">Skanūs Kepiniai</text>
</svg>
