services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-cakescatalog}
      MYSQL_USER: ${DB_USER:-cakeuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cakepass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/cakescatalog.sql:/docker-entrypoint-initdb.d/01-cakescatalog.sql
      - ./api/orders_table.sql:/docker-entrypoint-initdb.d/02-orders_table.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: ./api
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      PORT: 3000
      DB_HOST: mysql
      DB_USER: ${DB_USER:-cakeuser}
      DB_PASSWORD: ${DB_PASSWORD:-cakepass}
      DB_NAME: ${DB_NAME:-cakescatalog}
      EMAIL_USER: ${EMAIL_USER:-nojusgencas@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-your_email_password}
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: unless-stopped

  front:
    build: ./front
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./front:/app
      - /app/node_modules
    restart: unless-stopped

  admin:
    build: ./admin
    ports:
      - "5174:5174"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./admin:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mysql_data:
